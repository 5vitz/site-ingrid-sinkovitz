    <meta charset="UTF-8">

    <title>Lion Jump - Itália (Prints)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .article-container {
            width: 100%;
            max-width: 1200px;
            background-color: #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        img {
            display: block;
            width: 100%;
            height: auto;
        }
        .video-replacement {
            width: 100%;
            background-color: #000;
            aspect-ratio: 16 / 9;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            position: relative;
            overflow: hidden;
        }
        .video-replacement img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
        }
        .video-label {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            padding: 5px 10px;
            font-family: sans-serif;
            font-size: 12px;
            border-radius: 4px;
        }
    </style>
</head>
